<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Morphic Vortex</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
'use strict';

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H, cx, cy, S;

function resize() {
  W = canvas.width  = window.innerWidth;
  H = canvas.height = window.innerHeight;
  cx = W * 0.5;
  cy = H * 0.5;
  S  = Math.min(W, H) / 900;
}
resize();
window.addEventListener('resize', resize);

const TAU = Math.PI * 2;

// ─── Core maths ──────────────────────────────────────────────────────────────

// Signed radius of a regular n-gon (n can be fractional) at polar angle θ
function pR(θ, n, R) {
  const step = TAU / n;
  const mod  = ((θ % step) + step) % step;
  return R * Math.cos(Math.PI / n) / Math.cos(mod - Math.PI / n);
}

// ─── Draw helpers ─────────────────────────────────────────────────────────────

function polygon(x, y, R, n, rot, strokeStyle, lw, fillStyle) {
  const segs = Math.max(72, Math.ceil(n) * 24);
  ctx.beginPath();
  for (let i = 0; i <= segs; i++) {
    const θ  = (i / segs) * TAU + rot;
    const r  = pR(θ, n, R);
    const px = x + Math.cos(θ) * r;
    const py = y + Math.sin(θ) * r;
    i ? ctx.lineTo(px, py) : ctx.moveTo(px, py);
  }
  ctx.closePath();
  if (fillStyle)   { ctx.fillStyle = fillStyle; ctx.fill(); }
  if (strokeStyle) { ctx.strokeStyle = strokeStyle; ctx.lineWidth = lw; ctx.stroke(); }
}

function glowPolygon(x, y, R, n, rot, hue, sat, lit, alpha, lw) {
  // Three halo passes then a crisp core
  for (let g = 4; g >= 1; g--) {
    polygon(x, y, R * (1 + g * 0.18), n, rot,
      `hsla(${hue},${sat}%,${lit}%,${(alpha * 0.08) / g})`,
      (lw + g * 2.5) * S, null);
  }
  polygon(x, y, R, n, rot,
    `hsla(${hue},${sat}%,${lit + 12}%,${alpha})`,
    lw * S,
    `hsla(${hue},${sat - 20}%,${lit - 25}%,0.05)`);
}

// Hypotrochoid  x = (R-r)cosθ + d·cos((R-r)/r · θ)
function spirograph(R, r, d, turns, hue, alpha, lw) {
  const steps = 1200;
  const end   = TAU * turns;
  ctx.beginPath();
  for (let i = 0; i <= steps; i++) {
    const θ = (i / steps) * end;
    const x = cx + (R - r) * Math.cos(θ) + d * Math.cos(((R - r) / r) * θ);
    const y = cy + (R - r) * Math.sin(θ) - d * Math.sin(((R - r) / r) * θ);
    i ? ctx.lineTo(x, y) : ctx.moveTo(x, y);
  }
  ctx.strokeStyle = `hsla(${hue % 360},85%,62%,${alpha})`;
  ctx.lineWidth   = lw * S;
  ctx.stroke();
}

// Star polygon — connect each vertex on a circle to the one skip steps away
function starLines(radius, count, skip, rot, color, lw) {
  const pts = [];
  for (let i = 0; i < count; i++) {
    const a = (i / count) * TAU + rot;
    pts.push([cx + Math.cos(a) * radius, cy + Math.sin(a) * radius]);
  }
  ctx.strokeStyle = color;
  ctx.lineWidth   = lw * S;
  ctx.beginPath();
  for (let i = 0; i < count; i++) {
    const j = (i * skip) % count;
    ctx.moveTo(pts[i][0], pts[i][1]);
    ctx.lineTo(pts[j][0], pts[j][1]);
  }
  ctx.stroke();
}

// ─── Scene definition ─────────────────────────────────────────────────────────

// Each ring: orbital radius, shape count, rotation dir, speeds, polygon side range
const RINGS = [
  { r: 340, n: 12, dir:  1, os: 0.07, sm:  2.5, sb: 3, sa: 2.0, sz: 18 },
  { r: 272, n:  9, dir: -1, os: 0.11, sm: -3.5, sb: 4, sa: 2.0, sz: 20 },
  { r: 208, n:  8, dir:  1, os: 0.17, sm:  5.0, sb: 5, sa: 2.0, sz: 20 },
  { r: 150, n:  6, dir: -1, os: 0.26, sm: -7.0, sb: 6, sa: 2.0, sz: 18 },
  { r:  98, n:  5, dir:  1, os: 0.40, sm: 10.0, sb: 4, sa: 2.5, sz: 16 },
  { r:  50, n:  4, dir: -1, os: 0.65, sm:-14.0, sb: 3, sa: 2.5, sz: 13 },
];

// ─── Main loop ────────────────────────────────────────────────────────────────

let t = 0;

function frame() {
  t += 0.0055;

  // ── Trail fade ──
  ctx.fillStyle = 'rgba(0,0,0,0.042)';
  ctx.fillRect(0, 0, W, H);

  const baseHue = (t * 16) % 360;

  // ── Global breath (slow inhale/exhale) ──
  const breath = 1 + Math.sin(t * 0.45) * 0.06;

  // ── Spirograph background ──
  const spR = 285 * S * breath;
  for (let sp = 0; sp < 4; sp++) {
    const phase = sp * 1.1;
    const sr    = spR * (0.22 + sp * 0.07 + Math.sin(t * 0.18 + phase) * 0.04);
    const sd    = sr  * (0.55 + Math.cos(t * 0.12 + phase * 1.4) * 0.38);
    spirograph(spR, sr, sd, 14, baseHue + sp * 55, 0.055 + sp * 0.01, 0.7);
  }

  // ── Rings ──
  RINGS.forEach((ring, ri) => {
    const rr    = ring.r * S * breath + Math.sin(t * 0.55 + ri * 0.9) * 12 * S;
    const sides = ring.sb + Math.sin(t * 0.32 + ri * 1.6) * ring.sa;
    const sz    = ring.sz * S + Math.sin(t * 0.85 + ri * 0.7) * 4 * S;
    const hOff  = ri * 44;

    // Star-connection web for rings with enough shapes
    if (ring.n >= 5) {
      const skip = Math.max(2, Math.floor(ring.n * 0.4));
      const webAlpha = 0.10 + Math.sin(t * 0.5 + ri) * 0.04;
      starLines(rr, ring.n, skip, t * ring.os * ring.dir,
        `hsla(${(baseHue + hOff + 25) % 360},80%,65%,${webAlpha})`, 0.6);
    }

    for (let si = 0; si < ring.n; si++) {
      const orb  = (si / ring.n) * TAU + t * ring.os * ring.dir;
      const x    = cx + Math.cos(orb) * rr;
      const y    = cy + Math.sin(orb) * rr;
      const spin = t * ring.os * ring.dir * ring.sm;
      const hue  = (baseHue + hOff + si * (360 / ring.n)) % 360;
      const lit  = 60 + Math.sin(t * 1.1 + si * 0.65) * 10;
      const alp  = 0.42 + Math.sin(t * 0.88 + si * 0.55 + ri * 0.4) * 0.22;

      glowPolygon(x, y, sz, sides, spin, hue, 90, lit, alp, 1.3);
    }
  });

  // ── Central mandala ──
  const mHue = (baseHue + 140) % 360;
  for (let layer = 8; layer >= 1; layer--) {
    const lr    = (layer * 9.5) * S * breath + Math.sin(t * 0.65 + layer * 0.5) * 3 * S;
    const ln    = Math.max(3, 3 + Math.floor(layer * 0.75));
    const even  = layer % 2 === 0;
    const lrot  = t * (even ? 0.55 : -0.55) * (0.25 + layer * 0.04);
    const lhue  = (mHue + layer * 20) % 360;
    const lalp  = 0.55 + Math.sin(t * 1.4 + layer * 0.7) * 0.22;

    // Outer polygon
    polygon(cx, cy, lr, ln, lrot,
      `hsla(${lhue},100%,72%,${lalp})`, 1.6 * S,
      `hsla(${lhue},80%,40%,0.06)`);

    // Inset rotated counter-polygon
    polygon(cx, cy, lr * 0.78, ln, lrot + Math.PI / ln,
      `hsla(${(lhue + 35) % 360},100%,82%,${lalp * 0.45})`, 0.9 * S, null);
  }

  // ── Central radial glow ──
  const glowSize = (10 + Math.sin(t * 1.8) * 4) * S;
  const grd = ctx.createRadialGradient(cx, cy, 0, cx, cy, glowSize * 5);
  grd.addColorStop(0,   `hsla(${mHue},100%,98%,0.90)`);
  grd.addColorStop(0.2, `hsla(${mHue},100%,75%,0.55)`);
  grd.addColorStop(0.6, `hsla(${mHue},100%,55%,0.15)`);
  grd.addColorStop(1,   `hsla(${mHue},100%,40%,0.00)`);
  ctx.beginPath();
  ctx.arc(cx, cy, glowSize * 5, 0, TAU);
  ctx.fillStyle = grd;
  ctx.fill();

  // ── Edge vignette ──
  const vigR = Math.max(W, H) * 0.75;
  const vig  = ctx.createRadialGradient(cx, cy, vigR * 0.3, cx, cy, vigR);
  vig.addColorStop(0, 'rgba(0,0,0,0)');
  vig.addColorStop(1, 'rgba(0,0,0,0.55)');
  ctx.fillStyle = vig;
  ctx.fillRect(0, 0, W, H);

  requestAnimationFrame(frame);
}

requestAnimationFrame(frame);
</script>
</body>
</html>
