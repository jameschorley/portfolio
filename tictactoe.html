<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0f0f0f;
      font-family: 'Segoe UI', system-ui, sans-serif;
      color: #fff;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      color: #e2e2e2;
    }

    .scoreboard {
      display: flex;
      gap: 2rem;
      margin-bottom: 1.5rem;
    }

    .score-box {
      text-align: center;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 0.6rem 1.4rem;
      min-width: 80px;
    }

    .score-box .label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #888;
    }

    .score-box .value {
      font-size: 1.6rem;
      font-weight: 700;
    }

    .score-box.x .value { color: #e05c5c; }
    .score-box.o .value { color: #5ca8e0; }
    .score-box.draw .value { color: #aaa; }

    .status {
      font-size: 1rem;
      color: #aaa;
      margin-bottom: 1.2rem;
      height: 1.4em;
      transition: color 0.2s;
    }

    .status.win { color: #7dde7d; font-weight: 600; }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #242424;
      transform: scale(1.04);
    }

    .cell.taken { cursor: default; }
    .cell.x { color: #e05c5c; }
    .cell.o { color: #5ca8e0; }

    .cell.winning {
      background: #1f2d1a;
      border-color: #4a8a3a;
    }

    .controls {
      display: flex;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    button {
      padding: 0.55rem 1.4rem;
      border: 1px solid #333;
      border-radius: 8px;
      background: #1a1a1a;
      color: #ccc;
      font-size: 0.85rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }

    button:hover {
      background: #2a2a2a;
      color: #fff;
    }

    button.primary {
      border-color: #3a6a3a;
      color: #7dde7d;
    }

    button.primary:hover {
      background: #1f2d1a;
    }
  </style>
</head>
<body>
  <h1>Tic Tac Toe</h1>

  <div class="scoreboard">
    <div class="score-box x">
      <div class="label">X</div>
      <div class="value" id="score-x">0</div>
    </div>
    <div class="score-box draw">
      <div class="label">Draw</div>
      <div class="value" id="score-draw">0</div>
    </div>
    <div class="score-box o">
      <div class="label">O</div>
      <div class="value" id="score-o">0</div>
    </div>
  </div>

  <div class="status" id="status">X's turn</div>

  <div class="board" id="board">
    <div class="cell" data-i="0"></div>
    <div class="cell" data-i="1"></div>
    <div class="cell" data-i="2"></div>
    <div class="cell" data-i="3"></div>
    <div class="cell" data-i="4"></div>
    <div class="cell" data-i="5"></div>
    <div class="cell" data-i="6"></div>
    <div class="cell" data-i="7"></div>
    <div class="cell" data-i="8"></div>
  </div>

  <div class="controls">
    <button class="primary" id="btn-next">Next Round</button>
    <button id="btn-reset">Reset Scores</button>
  </div>

  <script>
    const WINS = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    let board = Array(9).fill(null);
    let current = 'X';
    let gameOver = false;
    let scores = { X: 0, O: 0, draw: 0 };

    const cells = document.querySelectorAll('.cell');
    const status = document.getElementById('status');
    const scoreX = document.getElementById('score-x');
    const scoreO = document.getElementById('score-o');
    const scoreDraw = document.getElementById('score-draw');

    cells.forEach(cell => {
      cell.addEventListener('click', () => {
        const i = +cell.dataset.i;
        if (gameOver || board[i]) return;

        board[i] = current;
        cell.textContent = current;
        cell.classList.add('taken', current.toLowerCase());

        const win = checkWin();
        if (win) {
          win.forEach(i => cells[i].classList.add('winning'));
          status.textContent = `${current} wins!`;
          status.className = 'status win';
          scores[current]++;
          updateScores();
          gameOver = true;
        } else if (board.every(Boolean)) {
          status.textContent = "It's a draw!";
          status.className = 'status';
          scores.draw++;
          updateScores();
          gameOver = true;
        } else {
          current = current === 'X' ? 'O' : 'X';
          status.textContent = `${current}'s turn`;
          status.className = 'status';
        }
      });
    });

    function checkWin() {
      for (const [a,b,c] of WINS) {
        if (board[a] && board[a] === board[b] && board[a] === board[c]) {
          return [a,b,c];
        }
      }
      return null;
    }

    function updateScores() {
      scoreX.textContent = scores.X;
      scoreO.textContent = scores.O;
      scoreDraw.textContent = scores.draw;
    }

    function nextRound() {
      board = Array(9).fill(null);
      gameOver = false;
      current = 'X';
      status.textContent = "X's turn";
      status.className = 'status';
      cells.forEach(cell => {
        cell.textContent = '';
        cell.className = 'cell';
      });
    }

    function resetAll() {
      scores = { X: 0, O: 0, draw: 0 };
      updateScores();
      nextRound();
    }

    document.getElementById('btn-next').addEventListener('click', nextRound);
    document.getElementById('btn-reset').addEventListener('click', resetAll);
  </script>
</body>
</html>
